<!DOCTYPE html>
<html>
<head>
  <title>Tower Defense</title>
  <style>
    body { margin: 0; background: #222; display: flex; flex-direction: column;
           justify-content: center; align-items: center; height: 100vh;
           font-family: sans-serif; color: #fff; }
    canvas { background: #4a7c4e; border: 2px solid #fff; }
    #ui { margin-top: 8px; display: flex; gap: 12px; }
    .btn { padding: 8px 18px; border-radius: 6px; border: 3px solid transparent;
           cursor: pointer; font-size: 15px; font-weight: bold; opacity: 0.7; }
    .btn.selected { border-color: #fff; opacity: 1; transform: scale(1.1); }
  </style>
</head>
<body>
<canvas id="game" width="800" height="500"></canvas>
<div id="ui"></div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// --- Tower types ---
const TYPES = {
  basic:  { label: '1 achers tower $50',  color: '#3bd17a', range: 150, fireRate: 60, damage: 2.5,   cost: 50  },
  sniper: { label: '2 Sniper $120',        color: '#4ab4ff', range: 380, fireRate: 120, damage: 6,   cost: 70 },
  rapid:  { label: '3 rapid $75',          color: '#ffaa22', range: 100, fireRate: 40,  damage: 1,   cost: 75  },
  slow:   { label: '4 mage tower $75',     color: '#cc66ff', range: 140, fireRate: 80, damage: 0.5, cost: 80, slows: true },
};

// --- Enemy types. Try changing speed, hp, or reward! ---
const ENEMIES = {
  goblin:      { kind: 'goblin',      color: '#e84040', speed: 1,   hp: 8,   size: 10, reward: 10,  castleDamage: 1  },
  runner:      { kind: 'runner',      color: '#ff9900', speed: 2.5, hp: 4,   size: 8,  reward: 15,  castleDamage: 1  },
  ogre:        { kind: 'ogre',        color: '#7b1010', speed: 0.9, hp: 50,  size: 18, reward: 30,  castleDamage: 5  },
  dragon:      { kind: 'dragon',      color: '#2ea84a', speed: 1.5, hp: 150, size: 24, reward: 75,  castleDamage: 15 },
  dragonRider: { kind: 'dragonRider', color: '#8b0000', speed: 1.0, hp: 300, size: 28, reward: 150, castleDamage: 30 },
};

const typeKeys = Object.keys(TYPES);
let selectedType = 'basic';

const ui = document.getElementById('ui');
typeKeys.forEach(key => {
  const btn = document.createElement('button');
  btn.id = 'btn-' + key;
  btn.className = 'btn' + (key === selectedType ? ' selected' : '');
  btn.textContent = TYPES[key].label;
  btn.style.background = TYPES[key].color;
  btn.onclick = () => select(key);
  ui.appendChild(btn);
});

function select(key) {
  selectedType = key;
  typeKeys.forEach(k => {
    document.getElementById('btn-' + k).className = 'btn' + (k === key ? ' selected' : '');
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') { restart(); return; }
  if (e.key === 'Escape') { selectedTower = null; return; }
  const i = parseInt(e.key) - 1;
  if (i >= 0 && i < typeKeys.length) select(typeKeys[i]);
});

const mouse = { x: 0, y: 0 };
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});

canvas.addEventListener('click', e => {
  if (gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;

  // Click an existing tower to select / deselect it
  const clicked = towers.find(t => distance(t, { x, y }) < 20);
  if (clicked) { selectedTower = selectedTower === clicked ? null : clicked; return; }

  // If a tower is selected, fire a powerful manual shot toward the click
  if (selectedTower) {
    if (selectedTower.manualCooldown > 0) { flash('Still reloading!'); return; }
    const dx = x - selectedTower.x, dy = y - selectedTower.y;
    const d = Math.hypot(dx, dy);
    projectiles.push({ x: selectedTower.x, y: selectedTower.y,
      vx: (dx / d) * 12, vy: (dy / d) * 12,
      damage: selectedTower.damage * 4, slows: selectedTower.slows, manual: true });
    selectedTower.manualCooldown = selectedTower.fireRate * 2;
    return;
  }

  // Otherwise place a new tower
  if (onPath(x, y)) { flash("Can't build on the path!"); return; }
  const type = TYPES[selectedType];
  if (money < type.cost) { flash(`Need $${type.cost} — you have $${money}!`); return; }
  towers.push({ x, y, ...type, typeKey: selectedType, cooldown: 0, hp: 8, maxHp: 8 });
  money -= type.cost;
  updateButtons();
});

const path = [
  { x: 0,   y: 100 },
  { x: 300, y: 100 },
  { x: 300, y: 400 },
  { x: 800, y: 400 },
];

let towers = [], enemies = [], projectiles = [];
let lives = 100, score = 0, money = 50, gameOver = false;
const MAX_MONEY = 500;
let flashMsg = '', flashTimer = 0;

// The tower the player is manually controlling (null = all towers auto)
let selectedTower = null;

// Wave system
let wave = 0;
let spawnQueue = [];   // list of enemy type names to spawn
let spawnDelay = 0;    // frames between each spawn
let breakTimer = 180;  // countdown before wave 1 starts
let inBreak = true;

function buildWave(n) {
  const queue = [];
  const count = n * 3 + 2;
  for (let i = 0; i < count; i++) {
    if (n >= 10 && i % 12 === 11)    queue.push('dragonRider');
    else if (n >= 7 && i % 8 === 7)  queue.push('dragon');
    else if (n >= 5 && i % 6 === 5)  queue.push('ogre');
    else if (n >= 2 && i % 3 === 2)  queue.push('runner');
    else                              queue.push('goblin');
  }
  return queue;
}

function startWave() {
  wave++;
  spawnQueue = buildWave(wave);
  spawnDelay = 0;
  inBreak = false;
}

function restart() {
  towers = []; enemies = []; projectiles = [];
  lives = 10; score = 0; money = 50; gameOver = false;
  flashMsg = ''; flashTimer = 0;
  wave = 0; spawnQueue = []; spawnDelay = 0;
  breakTimer = 180; inBreak = true;
  selectedTower = null;
  updateButtons();
}

function flash(msg) { flashMsg = msg; flashTimer = 120; }

function updateButtons() {
  typeKeys.forEach(k => {
    document.getElementById('btn-' + k).style.opacity = money >= TYPES[k].cost ? '0.9' : '0.35';
  });
}

function distance(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function onPath(x, y) {
  const margin = 30;
  for (let i = 0; i < path.length - 1; i++) {
    const a = path[i], b = path[i + 1];
    const dx = b.x - a.x, dy = b.y - a.y;
    const len2 = dx * dx + dy * dy;
    const t = Math.max(0, Math.min(1, ((x - a.x) * dx + (y - a.y) * dy) / len2));
    if (Math.hypot(x - (a.x + t * dx), y - (a.y + t * dy)) < margin) return true;
  }
  return false;
}

// Pre-generate map decorations (random but fixed — generated once at load)
const grassTufts = Array.from({ length: 200 }, () => ({
  x: Math.random() * 800, y: Math.random() * 500,
  r: 2 + Math.random() * 5,
  c: ['#3a6b3e','#4a7c4e','#568a5a','#3d7040'][Math.floor(Math.random() * 4)],
}));
const trees = [];
let attempts = 0;
while (trees.length < 14 && attempts++ < 2000) {
  const tx = 25 + Math.random() * 750, ty = 25 + Math.random() * 450;
  if (!onPath(tx, ty) && trees.every(t => Math.hypot(t.x - tx, t.y - ty) > 35))
    trees.push({ x: tx, y: ty, r: 14 + Math.random() * 10 });
}

function update() {
  if (gameOver) return;
  if (flashTimer > 0) flashTimer--;

  // Wave / spawn logic
  if (inBreak) {
    breakTimer--;
    if (breakTimer <= 0) startWave();
    return; // don't spawn enemies during break, but towers still work below
  }

  // Spawn next enemy from queue
  if (spawnDelay > 0) { spawnDelay--; }
  else if (spawnQueue.length > 0) {
    const type = ENEMIES[spawnQueue.shift()];
    enemies.push({ x: path[0].x, y: path[0].y, slowTimer: 0, hitTimer: 0, waypoint: 1, ...type, maxHp: type.hp, hp: type.hp });
    spawnDelay = 60;
  } else if (enemies.length === 0) {
    // Wave cleared!
    inBreak = true;
    breakTimer = 300; // 5 seconds to place towers
    money = Math.min(money + 20 * wave, MAX_MONEY); // bonus gold per wave
    updateButtons();
  }

  // Move enemies
  for (const e of enemies) {
    const spd = e.slowTimer > 0 ? e.speed * 0.35 : e.speed;
    if (e.slowTimer > 0) e.slowTimer--;
    const target = path[e.waypoint];
    if (!target) continue;
    const dx = target.x - e.x, dy = target.y - e.y;
    const d = Math.hypot(dx, dy);
    if (e.hitTimer > 0) e.hitTimer--;
    if (d < spd) { e.waypoint++; }
    else { e.x += (dx / d) * spd; e.y += (dy / d) * spd; }
  }
  enemies = enemies.filter(e => {
    if (e.waypoint >= path.length) { lives -= e.castleDamage; if (lives <= 0) gameOver = true; return false; }
    return true;
  });

  // Runners occasionally snipe far-away towers with arrows
  for (const e of enemies) {
    if (e.kind !== 'runner') continue;
    if (e.shootTimer === undefined) e.shootTimer = Math.floor(Math.random() * 120);
    e.shootTimer--;
    if (e.shootTimer <= 0) {
      const tgt = towers.filter(t => distance(e, t) < 280 && distance(e, t) > 60)
                        .sort((a, b) => distance(e, b) - distance(e, a))[0]; // pick farthest in range
      if (tgt) {
        const dx = tgt.x - e.x, dy = tgt.y - e.y, d = Math.hypot(dx, dy);
        projectiles.push({ x: e.x, y: e.y, vx: (dx / d) * 4, vy: (dy / d) * 4,
                           damage: 1, fromEnemy: true });
      }
      e.shootTimer = 150 + Math.floor(Math.random() * 120); // ~2.5–4.5 s reload
    }
  }

  // Dragons breathe fire at towers ahead of them
  for (const e of enemies) {
    if (e.kind !== 'dragon' && e.kind !== 'dragonRider') continue;
    if (e.fireTimer === undefined) e.fireTimer = Math.floor(Math.random() * 120);
    e.fireTimer--;
    if (e.fireTimer <= 0) {
      const wp = path[Math.min(e.waypoint, path.length - 1)];
      const ang = Math.atan2(wp.y - e.y, wp.x - e.x);
      // 3 spread shots in a cone forward
      for (let s = -1; s <= 1; s++) {
        const a = ang + s * 0.3;
        projectiles.push({ x: e.x, y: e.y, vx: Math.cos(a) * 5, vy: Math.sin(a) * 5,
                           damage: e.kind === 'dragonRider' ? 3 : 2, fromEnemy: true, fire: true });
      }
      e.fireTimer = 180 + Math.floor(Math.random() * 90); // ~3–4.5 s between bursts
    }
  }

  // Tick down manual cooldown on selected tower
  if (selectedTower && selectedTower.manualCooldown > 0) selectedTower.manualCooldown--;

  // Towers auto-shoot (skip the one the player is controlling)
  for (const t of towers) {
    if (t === selectedTower) continue;
    t.cooldown--;
    if (t.cooldown > 0) continue;
    const target = enemies.find(e => distance(t, e) < t.range);
    if (target) {
      t.angle = Math.atan2(target.y - t.y, target.x - t.x);
      projectiles.push({ x: t.x, y: t.y, target, speed: 6, damage: t.damage, slows: t.slows });
      t.cooldown = t.fireRate;
    }
  }

  // Move projectiles — manual ones fly straight, auto ones track a target
  for (const p of projectiles) {
    if (p.fromEnemy) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < -20 || p.x > canvas.width + 20 || p.y < -20 || p.y > canvas.height + 20) { p.dead = true; continue; }
      const hitTower = towers.find(t => distance(p, t) < 18);
      if (hitTower) { hitTower.hp -= p.damage; p.dead = true; }
    } else if (p.manual) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < -20 || p.x > canvas.width + 20 || p.y < -20 || p.y > canvas.height + 20) { p.dead = true; continue; }
      const hit = enemies.find(e => distance(p, e) < e.size + 5);
      if (hit) { hit.hp -= p.damage; hit.hitTimer = 8; if (p.slows) hit.slowTimer = 80; p.dead = true; }
    } else {
      if (!enemies.includes(p.target)) { p.dead = true; continue; }
      const dx = p.target.x - p.x, dy = p.target.y - p.y;
      const d = Math.hypot(dx, dy);
      if (d < p.speed) { p.target.hp -= p.damage; p.target.hitTimer = 8; if (p.slows) p.target.slowTimer = 80; p.dead = true; }
      else { p.x += (dx / d) * p.speed; p.y += (dy / d) * p.speed; }
    }
  }
  projectiles = projectiles.filter(p => !p.dead);

  // Enemies near towers deal damage to them
  for (const t of towers) {
    for (const e of enemies) {
      if (distance(t, e) < 55) t.hp -= e.kind === 'dragonRider' ? 0.08 : e.kind === 'dragon' ? 0.05 : 0.015;
    }
  }
  towers = towers.filter(t => {
    if (t.hp <= 0) { if (t === selectedTower) selectedTower = null; return false; }
    return true;
  });

  const before = enemies.length;
  enemies = enemies.filter(e => { if (e.hp <= 0) { score++; money = Math.min(money + e.reward, MAX_MONEY); return false; } return true; });
  if (enemies.length < before) updateButtons();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grass texture
  for (const g of grassTufts) {
    ctx.fillStyle = g.c;
    ctx.beginPath(); ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2); ctx.fill();
  }

  // Path — 3 layers for a dirt road look
  const drawPathLine = (color, width) => {
    ctx.strokeStyle = color; ctx.lineWidth = width; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
    ctx.stroke();
  };
  drawPathLine('#6b3f1e', 46);
  drawPathLine('#9e6030', 38);
  drawPathLine('#c4885a', 22);
  ctx.lineJoin = 'miter'; ctx.lineCap = 'butt';

  // Trees (drawn before towers so towers appear on top)
  for (const tr of trees) {
    ctx.fillStyle = '#1e4220';
    ctx.beginPath(); ctx.arc(tr.x, tr.y, tr.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#2d6b32';
    ctx.beginPath(); ctx.arc(tr.x - tr.r * 0.2, tr.y - tr.r * 0.25, tr.r * 0.72, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#3a8040';
    ctx.beginPath(); ctx.arc(tr.x - tr.r * 0.3, tr.y - tr.r * 0.4, tr.r * 0.45, 0, Math.PI * 2); ctx.fill();
  }

  // Spawn portal
  ctx.strokeStyle = '#ff2222'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(path[0].x, path[0].y, 22, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = 'rgba(255,30,30,0.18)';
  ctx.beginPath(); ctx.arc(path[0].x, path[0].y, 22, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ff4444'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('SPAWN', path[0].x, path[0].y + 4); ctx.textAlign = 'left';

  // Castle at end of path
  const [cx, cy] = [path[path.length - 1].x, path[path.length - 1].y];
  ctx.fillStyle = '#777'; ctx.fillRect(cx - 34, cy - 30, 68, 40);
  ctx.fillStyle = '#888'; ctx.fillRect(cx - 34, cy - 44, 20, 18);
  ctx.fillStyle = '#888'; ctx.fillRect(cx + 14, cy - 44, 20, 18);
  ctx.fillStyle = '#555'; ctx.fillRect(cx - 10, cy - 8, 20, 18);
  ctx.fillStyle = 'rgba(255,160,0,0.55)'; ctx.fillRect(cx - 6, cy - 4, 12, 10);

  // Towers — battlemented stone towers with a person + weapon inside
  for (const t of towers) {
    const isSelected = t === selectedTower;
    const angle = isSelected ? Math.atan2(mouse.y - t.y, mouse.x - t.x) : (t.angle || 0);
    const tx = t.x - 15, ty = t.y - 18;

    // Range circle
    ctx.strokeStyle = isSelected ? 'rgba(255,255,255,0.45)' : 'rgba(255,255,255,0.1)';
    ctx.lineWidth = isSelected ? 2 : 1;
    ctx.beginPath(); ctx.arc(t.x, t.y, t.range, 0, Math.PI * 2); ctx.stroke();

    // Stone tower body
    ctx.fillStyle = '#4a4a4a'; ctx.fillRect(tx, ty, 30, 38);
    ctx.fillStyle = '#646464'; ctx.fillRect(tx + 2, ty + 2, 26, 34);

    // Battlements (3 merlons on top)
    ctx.fillStyle = '#4a4a4a';
    ctx.fillRect(tx,      ty - 10, 8, 11);
    ctx.fillRect(tx + 11, ty - 10, 8, 11);
    ctx.fillRect(tx + 22, ty - 10, 8, 11);

    // Arrow slit (dark window)
    ctx.fillStyle = '#111'; ctx.fillRect(t.x - 4, ty + 6, 8, 14);

    // Person head
    ctx.fillStyle = '#e8b890';
    ctx.beginPath(); ctx.arc(t.x, ty + 9, 5, 0, Math.PI * 2); ctx.fill();

    // Weapon pointing toward target (rotates with angle)
    const tKey = t.typeKey || (t.slows ? 'slow' : t.damage >= 5 ? 'sniper' : t.range <= 110 ? 'rapid' : 'basic');
    ctx.save(); ctx.translate(t.x, t.y - 5); ctx.rotate(angle);
    if (tKey === 'sniper') {
      // Catapult: wooden base frame + throwing arm + boulder
      ctx.fillStyle = '#6b3a10';
      ctx.fillRect(-10, -3, 20, 6);          // base beam
      ctx.fillRect(-9, -3, 4, 10);           // left leg
      ctx.fillRect(5, -3, 4, 10);            // right leg
      ctx.fillStyle = '#8b4c12';
      ctx.save(); ctx.translate(0, -3); ctx.rotate(-0.7);
      ctx.fillRect(-2, -14, 4, 16);          // throwing arm
      ctx.restore();
      ctx.fillStyle = '#555';
      ctx.beginPath(); ctx.arc(8, -12, 5, 0, Math.PI * 2); ctx.fill(); // boulder
    } else if (tKey === 'rapid') {
      // Crossbow: stock + prod (horizontal arms) + string + bolt
      ctx.fillStyle = '#5a3010';
      ctx.fillRect(0, -2, 20, 4);            // stock
      ctx.fillRect(-2, -1, 6, 2);            // grip
      ctx.fillStyle = '#4a2808';
      ctx.fillRect(4, -8, 4, 16);            // prod (vertical arms)
      ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(4, -8); ctx.lineTo(8, 0); ctx.lineTo(4, 8); ctx.stroke(); // string
      ctx.fillStyle = '#aaa';
      ctx.fillRect(8, -1, 14, 2);            // bolt/quarrel
      ctx.fillStyle = '#888';
      ctx.beginPath(); ctx.moveTo(22, -3); ctx.lineTo(22, 3); ctx.lineTo(26, 0); ctx.closePath(); ctx.fill(); // arrowhead
    } else if (tKey === 'slow') {
      ctx.fillStyle = '#5a3a1a'; ctx.fillRect(-1.5, -22, 3, 24);
      ctx.fillStyle = t.color; ctx.shadowColor = t.color; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(0, -22, 5, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      // Bow + nocked arrow (archers tower)
      ctx.strokeStyle = '#7a3d0a'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(4, -11); ctx.quadraticCurveTo(17, 0, 4, 11); ctx.stroke();
      ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(4, -11); ctx.lineTo(4, 11); ctx.stroke();
      ctx.strokeStyle = '#c8c880'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(4, 0); ctx.lineTo(22, 0); ctx.stroke();
      ctx.lineCap = 'butt';
    }
    ctx.restore();

    // HP bar below tower
    const hpFrac = t.hp != null ? t.hp / t.maxHp : 1;
    ctx.fillStyle = '#222'; ctx.fillRect(tx, t.y + 22, 30, 5);
    ctx.fillStyle = hpFrac > 0.5 ? '#0f0' : hpFrac > 0.25 ? '#f80' : '#f00';
    ctx.fillRect(tx, t.y + 22, 30 * hpFrac, 5);

    // Selection ring
    if (isSelected) {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(t.x, t.y, 26, 0, Math.PI * 2); ctx.stroke();
    }
  }

  // Aim line + reload arc for selected tower
  if (selectedTower) {
    const reloading = selectedTower.manualCooldown > 0;
    const maxCD = selectedTower.fireRate * 2;

    // Reload arc sweeps around the tower as it charges up
    if (reloading) {
      const progress = 1 - selectedTower.manualCooldown / maxCD;
      ctx.strokeStyle = '#f84'; ctx.lineWidth = 4; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.arc(selectedTower.x, selectedTower.y, 24, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * progress);
      ctx.stroke();
      ctx.lineCap = 'butt';
    }

    // Aim line — red when reloading, white when ready
    ctx.strokeStyle = reloading ? 'rgba(255,100,50,0.5)' : 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(selectedTower.x, selectedTower.y);
    ctx.lineTo(mouse.x, mouse.y);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Enemies
  for (const e of enemies) {
    const wp = path[Math.min(e.waypoint, path.length - 1)];
    const facing = Math.atan2(wp.y - e.y, wp.x - e.x);

    // Dragon / DragonRider wings — drawn behind body so they appear to spread out
    if (e.kind === 'dragon' || e.kind === 'dragonRider') {
      ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(facing);
      const wc = e.kind === 'dragonRider' ? '#5a0000' : '#1a6b30';
      ctx.fillStyle = wc;
      // Left wing
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.bezierCurveTo(-e.size, -e.size * 1.6, -e.size * 2.2, -e.size * 0.4, -e.size * 2, e.size * 0.5); ctx.closePath(); ctx.fill();
      // Right wing
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.bezierCurveTo(-e.size, e.size * 1.6, -e.size * 2.2, e.size * 0.4, -e.size * 2, -e.size * 0.5); ctx.closePath(); ctx.fill();
      ctx.restore();
    }

    // Body (re-draw on top of wings)
    ctx.fillStyle = e.hitTimer > 0 ? '#fff' : e.slowTimer > 0 ? '#bb66ff' : e.color;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2); ctx.stroke();

    // Face — only draw when not flashing white
    if (e.hitTimer === 0) {
      if (e.kind === 'ogre') {
        // Ogre: horns (screen-up always) + glowing orange eyes (facing direction)
        ctx.fillStyle = '#2a1005';
        ctx.beginPath(); ctx.moveTo(e.x - 8, e.y - e.size + 3); ctx.lineTo(e.x - 3, e.y - e.size - 10); ctx.lineTo(e.x + 1, e.y - e.size + 3); ctx.fill();
        ctx.beginPath(); ctx.moveTo(e.x - 1, e.y - e.size + 3); ctx.lineTo(e.x + 4, e.y - e.size - 10); ctx.lineTo(e.x + 9, e.y - e.size + 3); ctx.fill();
        ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(facing);
        ctx.fillStyle = '#ff6600';
        ctx.beginPath(); ctx.arc(e.size * 0.45, -5, 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(e.size * 0.45,  5, 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(e.size * 0.45 + 1.5, -5, 1.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(e.size * 0.45 + 1.5,  5, 1.5, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      } else if (e.kind === 'dragon' || e.kind === 'dragonRider') {
        // Dragon: swept-back horns + yellow slit eye + tail spike
        ctx.fillStyle = e.kind === 'dragonRider' ? '#3a0000' : '#0d4020';
        ctx.beginPath(); ctx.moveTo(e.x - 6, e.y - e.size + 2); ctx.lineTo(e.x - 9, e.y - e.size - 14); ctx.lineTo(e.x - 2, e.y - e.size + 2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(e.x + 2,  e.y - e.size + 2); ctx.lineTo(e.x + 9, e.y - e.size - 14); ctx.lineTo(e.x + 6, e.y - e.size + 2); ctx.fill();
        ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(facing);
        // Yellow slit eye
        ctx.fillStyle = '#ffe000';
        ctx.beginPath(); ctx.arc(e.size * 0.55, 0, 5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.fillRect(e.size * 0.55 - 1.5, -4, 3, 8); // vertical slit
        // Tail spike behind body
        ctx.fillStyle = e.kind === 'dragonRider' ? '#5a0000' : '#1a6b30';
        ctx.beginPath(); ctx.moveTo(-e.size, -4); ctx.lineTo(-e.size - 18, 0); ctx.lineTo(-e.size, 4); ctx.fill();
        ctx.restore();
        // DragonRider: small armored figure sitting on top
        if (e.kind === 'dragonRider') {
          ctx.save(); ctx.translate(e.x, e.y - e.size - 4);
          ctx.fillStyle = '#777'; ctx.fillRect(-4, -12, 8, 10);   // armor body
          ctx.fillStyle = '#999'; ctx.fillRect(-5, -14, 10, 4);   // shoulders
          ctx.fillStyle = '#aaa';
          ctx.beginPath(); ctx.arc(0, -17, 5, 0, Math.PI * 2); ctx.fill(); // helmet
          ctx.fillStyle = '#555'; ctx.fillRect(-1, -16, 2, 5);    // visor slit
          // Lance pointing forward
          ctx.rotate(facing);
          ctx.fillStyle = '#8b5e2a'; ctx.fillRect(0, -2, e.size + 18, 4);
          ctx.fillStyle = '#ccc';
          ctx.beginPath(); ctx.moveTo(e.size + 18, -4); ctx.lineTo(e.size + 28, 0); ctx.lineTo(e.size + 18, 4); ctx.closePath(); ctx.fill();
          ctx.restore();
        }
      } else {
        // Goblin / Runner: white eyes with black pupils facing direction of travel
        ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(facing);
        const ex = e.size * 0.48, ey = e.size * 0.38;
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(ex, -ey, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex,  ey, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(ex + 0.8, -ey, 1.2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex + 0.8,  ey, 1.2, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
    }

    // Weapons — always visible (dragons have no extra weapon, they ARE the weapon)
    if (e.kind !== 'dragon' && e.kind !== 'dragonRider') {
      ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(facing);
      if (e.kind === 'ogre') {
        // Ogre — big spiked club
        ctx.rotate(-0.4);
        ctx.fillStyle = '#3d1f08'; ctx.fillRect(-3, -e.size - 16, 6, e.size * 0.55);
        ctx.fillStyle = '#2a1005';
        ctx.beginPath(); ctx.arc(0, -e.size - 16, 9, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#777';
        ctx.beginPath(); ctx.arc(-2, -e.size - 19, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(3,  -e.size - 14, 2,   0, Math.PI * 2); ctx.fill();
      } else if (e.kind === 'runner') {
        // Runner — bow carried on side
        ctx.strokeStyle = '#7a3d0a'; ctx.lineWidth = 2; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(-2, -e.size * 0.85); ctx.quadraticCurveTo(8, 0, -2, e.size * 0.85); ctx.stroke();
        ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(-2, -e.size * 0.85); ctx.lineTo(-2, e.size * 0.85); ctx.stroke();
        ctx.lineCap = 'butt';
      } else {
        // Goblin — sword raised forward
        ctx.fillStyle = '#8b5e2a'; ctx.fillRect(e.size * 0.4, -4, 4, 7);
        ctx.fillStyle = '#aaa';    ctx.fillRect(e.size * 0.3, -5, 7, 3);
        ctx.fillStyle = '#ddd';    ctx.fillRect(e.size * 0.45, -e.size - 4, 3, e.size * 0.7);
      }
      ctx.restore();
    }

    // HP bar
    const bw = e.size * 2.5, bh = 5, bx = e.x - bw / 2, by = e.y - e.size - 12;
    ctx.fillStyle = '#222'; ctx.fillRect(bx - 1, by - 1, bw + 2, bh + 2);
    ctx.fillStyle = e.hp / e.maxHp > 0.5 ? '#0f0' : '#f80';
    ctx.fillRect(bx, by, bw * (e.hp / e.maxHp), bh);
  }

  // Projectiles
  for (const p of projectiles) {
    if (p.fromEnemy && p.fire) {
      // Dragon fireball — glowing orange/yellow ball
      ctx.save();
      ctx.shadowColor = '#ff6600'; ctx.shadowBlur = 14;
      ctx.fillStyle = '#ffdd00';
      ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ff4400';
      ctx.beginPath(); ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();
    } else if (p.fromEnemy) {
      // Runner arrow — small line pointing in direction of travel
      const ang = Math.atan2(p.vy, p.vx);
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(ang);
      ctx.strokeStyle = '#c8a040'; ctx.lineWidth = 2; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(-7, 0); ctx.lineTo(7, 0); ctx.stroke();
      ctx.fillStyle = '#aaa';
      ctx.beginPath(); ctx.moveTo(7, -2.5); ctx.lineTo(12, 0); ctx.lineTo(7, 2.5); ctx.closePath(); ctx.fill();
      ctx.restore();
    } else {
      ctx.fillStyle = p.slows ? '#cc66ff' : p.damage > 1 ? '#4ab4ff' : '#ff0';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.damage > 1 ? 6 : 4, 0, Math.PI * 2); ctx.fill();
    }
  }

  // HUD
  ctx.font = 'bold 18px sans-serif';
  ctx.fillStyle = '#fff'; ctx.fillText(`Lives: ${lives}`, 10, 22);
  ctx.fillStyle = '#fff'; ctx.fillText(`Kills: ${score}`, 120, 22);
  ctx.fillStyle = '#ffd700'; ctx.fillText(`$${money}`, 220, 22);
  ctx.fillStyle = '#7df'; ctx.fillText(`Wave: ${wave}`, 290, 22);

  // Break countdown overlay
  if (inBreak && !gameOver) {
    const sec = Math.ceil(breakTimer / 60);
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#7df';
    ctx.font = 'bold 36px sans-serif';
    ctx.fillText(wave === 0 ? 'Place your towers!' : `Wave ${wave} cleared! +$${20 * wave}`, canvas.width / 2, canvas.height / 2 - 20);
    ctx.fillStyle = '#fff'; ctx.font = '24px sans-serif';
    ctx.fillText(`Wave ${wave + 1} starts in ${sec}...`, canvas.width / 2, canvas.height / 2 + 20);
    ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '14px sans-serif';
    ctx.fillText('Goblins  •  Runners  •  Ogres  •  Dragons (wave 7)  •  Dragon Riders (wave 10)', canvas.width / 2, canvas.height / 2 + 55);
    ctx.textAlign = 'left';
  }

  // Flash message
  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(255,80,80,${flashTimer / 120})`;
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(flashMsg, canvas.width / 2, canvas.height / 2);
    ctx.textAlign = 'left';
  }

  // Hint
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '13px sans-serif';
  const hint = selectedTower ? 'Click to shoot · click tower again or Esc to release' : '1-4 select type · click to place · click tower to control';
  ctx.fillText(hint, canvas.width / 2 - 160, 22);

  // Game over
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff4444'; ctx.font = 'bold 64px sans-serif';
    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 30);
    ctx.fillStyle = '#fff'; ctx.font = '24px sans-serif';
    ctx.fillText(`Survived ${wave} waves  •  ${score} kills`, canvas.width / 2, canvas.height / 2 + 20);
    ctx.fillText('Press R to play again', canvas.width / 2, canvas.height / 2 + 60);
    ctx.textAlign = 'left';
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
