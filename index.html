<!DOCTYPE html>
<html>
<head>
  <title>Tower Defense</title>
  <style>
    body { margin: 0; background: #222; display: flex; flex-direction: column;
           justify-content: center; align-items: center; height: 100vh;
           font-family: sans-serif; color: #fff; }
    canvas { background: #4a7c4e; border: 2px solid #fff; }
    #ui { margin-top: 8px; display: flex; gap: 12px; }
    .btn { padding: 8px 18px; border-radius: 6px; border: 3px solid transparent;
           cursor: pointer; font-size: 15px; font-weight: bold; opacity: 0.7; }
    .btn.selected { border-color: #fff; opacity: 1; transform: scale(1.1); }
  </style>
</head>
<body>
<canvas id="game" width="800" height="500"></canvas>
<div id="ui"></div>
<script type="module" src="js/Game.js"></script>
</body>
</html>
